resshift_v1_10x:
  description: consine | time_step = 3 | 10x | use_gate = False | num_affine = 3
  
  dataset:
    scale_factor: 10

  diffusion:
    n_timesteps: 3
    kappa: 0.02
    sqrt_etas: [0.05, 0.6, 0.99]
    etas_end: 0.99
    min_noise_level: 0.04
    power: 0.3
    normalize_input: True

  model_type: unet
  model_params:
    unet:
      ch_in_xt: 1
      dim_lulc_embed: 8
      use_gate: False
      ch_base: 32
      num_affine: 3
      attn_levels: [2,3]
      max_seq_len: ${diffusion.n_timesteps}


