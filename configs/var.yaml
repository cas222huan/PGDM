resshift_8x_groklst_v3:
  description: GrokLST dataset

  dataloader_train:
    batch_size: 4
    num_workers: 2
    pin_memory: True
    persistent_workers: True
    shuffle: True

  dataloader_val:
    batch_size: 2 #8
    num_workers: 2
    pin_memory: True
    persistent_workers: True
    shuffle: False

  diffusion:
    n_timesteps: 3
    kappa: 0.02
    sqrt_etas: [0.05, 0.6, 0.99]
    etas_end: 0.99
    min_noise_level: 0.04
    power: 0.3
    normalize_input: True

  model_type: unet
  model_params:
    unet:
      ch_in_xt: 1
      dim_lulc_embed: 8
      use_gate: False
      ch_base: 32
      num_affine: 3
      ch_mult: [1,2,4,8,16]
      attn_levels: [3,4]
      max_seq_len: ${diffusion.n_timesteps}

  train:
    n_epochs: 300
    patience: 20
    optimizer:
      type: adamw
      params:
        lr: 1e-4
        weight_decay: 1e-4
    scheduler:
      type: cosine
      params:
        T_max: ${train.n_epochs}
        eta_min: 1e-5